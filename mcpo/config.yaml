# https://developers.home-assistant.io/docs/apps/configuration#app-configuration
name: mcpo MCP Proxy
version: "0.0.20"
slug: mcpo
description: "MCP-to-OpenAPI Proxy"
url: "https://github.com/TheSpaceGod/mcpo-hass-app/tree/main/mcpo"
arch:
  - aarch64
  - amd64
init: false
ports:
  "8000/tcp":

ports_description:
  "8000/tcp": MCPO proxy port for Open WebUI to connect
map:
  - share:rw
options:
  servers_json: |
    {
      "memory": {
        "command": "npx",
        "args": ["-y", "@modelcontextprotocol/server-memory"]
      }
    }
  api_key: ""
schema:
  servers_json: "str?"
  api_key: "str?"
image: "ghcr.io/thespacegod/mcpo-hass-app"
